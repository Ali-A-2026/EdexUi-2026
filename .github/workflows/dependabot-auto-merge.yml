name: Dependabot Auto Merge

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request_target' ||
      (
        contains(fromJson('["dependabot[bot]","app/dependabot"]'), github.event.pull_request.user.login) &&
        github.event.pull_request.draft == false
      )
    steps:
      - name: Auto-maintain Dependabot pull requests
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set +e

          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            prs="${{ github.event.pull_request.number }}"
          else
            prs="$(gh pr list --repo "$REPO" --state open --author 'app/dependabot' --json number --jq '.[].number')"
          fi

          if [ -z "$prs" ]; then
            echo "No open Dependabot PRs to process."
            exit 0
          fi

          for pr in $prs; do
            echo "Processing Dependabot PR #$pr"

            gh pr review --repo "$REPO" --approve "$pr" -b "Auto-approved dependency update." || true

            state="$(gh pr view "$pr" --repo "$REPO" --json state --jq .state)"
            draft="$(gh pr view "$pr" --repo "$REPO" --json isDraft --jq .isDraft)"
            merge_state="$(gh pr view "$pr" --repo "$REPO" --json mergeStateStatus --jq .mergeStateStatus)"

            echo "state=$state draft=$draft mergeStateStatus=$merge_state"
            if [ "$state" != "OPEN" ] || [ "$draft" = "true" ]; then
              echo "Skipping PR #$pr because it is not open/ready."
              continue
            fi

            if [ "$merge_state" = "DIRTY" ]; then
              gh pr comment "$pr" --repo "$REPO" --body "@dependabot rebase" || true
              echo "PR #$pr is in conflict; requested rebase."
              continue
            fi

            merged=0

            gh pr merge --repo "$REPO" --admin --squash --delete-branch "$pr" && merged=1
            if [ "$merged" -eq 0 ]; then
              gh pr merge --repo "$REPO" --squash --delete-branch "$pr" && merged=1
            fi
            if [ "$merged" -eq 0 ]; then
              gh pr merge --repo "$REPO" --auto --squash --delete-branch "$pr" && merged=1
            fi

            if [ "$merged" -eq 1 ]; then
              echo "PR #$pr merged."
            else
              echo "::warning::Could not merge PR #$pr now (checks/policy/API state)."
            fi
          done
