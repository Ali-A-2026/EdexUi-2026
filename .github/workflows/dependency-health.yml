name: Dependency health

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "src/package.json"
      - "src/package-lock.json"
      - ".github/workflows/dependency-health.yml"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Auto-fix root dependencies (best effort)
        run: npm audit fix --omit=dev || true

      - name: Audit root dependencies (critical only)
        run: npm audit --omit=dev --audit-level=critical

      - name: Install app dependencies
        run: cd src && npm install --legacy-peer-deps

      - name: Auto-fix app dependencies (best effort)
        run: cd src && npm audit fix --omit=dev || true

      - name: Audit app dependencies (critical only)
        run: cd src && npm audit --omit=dev --audit-level=critical
