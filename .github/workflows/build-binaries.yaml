name: Build packaged binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libc6-dev-i386 gcc-multilib g++-multilib rpm

      - name: Install root dependencies
        run: npm install

      - name: Install app dependencies
        run: cd src && npm install --legacy-peer-deps

      - name: Prepare packaged app sources
        run: npm run prebuild-linux

      - name: Build Linux artifacts
        run: ./node_modules/.bin/electron-builder build -l AppImage deb rpm --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release-files
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/latest-linux.yml
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Prepare packaged app sources
        run: npm run prebuild-windows

      - name: Build Windows artifact
        run: .\node_modules\.bin\electron-builder build -w --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release-files
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error

  build-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Prepare packaged app sources
        run: npm run prebuild-darwin

      - name: Build macOS artifact
        run: ./node_modules/.bin/electron-builder build -m --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: macos-release-files
          path: dist/*.dmg
          if-no-files-found: error

      - name: Upload DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.dmg
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
